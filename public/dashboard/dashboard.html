<body>

    <div class="main">

        <div class="sidebar">
            <div class="header-left">
                <div class="logo">
                    <h3>One Piece Dashboard</h3>
                </div>
                <div class="hello">
                    <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
                </div>
                <div class="btn-nav">
                    <a href="../quiz.html">
                        <h3>Quiz</h3>
                    </a>
                </div>
                <div class="btn-nav">
                    <a href="../index.html">

                <div class="btn-logout">
                    <a onclick="limparSessao()">
                        <h3>Sair</h3>
                    </a>
                </div>

        </div>

        <div class="dashboard">
            <div class="container">
                <div class="dashboard-grid">

                    <div class="card kpi">
                        <h4>Usuário</h4>
                        <p id="kpi_nome">Carregando...</p>
                    </div>

                    <div class="card kpi personagem">
                        <h4>Personagem favorito</h4>
                        <div id="container_personagem" class="container-personagem">
                            <img id="img_personagem" src="" style="">
                            <p id="kpi_personagem">Nenhum</p>
                        </div>
                        <div class="div-atualizar">
                            <select id="sel_mugiwara" style="margin-top: 10px; padding: 5px;">
                                <option value="1">Luffy</option>
                                <option value="2">Zoro</option>
                                <option value="3">Nami</option>
                                <option value="4">Usopp</option>
                                <option value="5">Sanji</option>
                                <option value="6">Chopper</option>

                            </select>

                        </div>
                    </div>

                    <div class="card kpi">
                        <h4>Recorde</h4>
                        <p id="kpi_recorde">Carregando...</p>
                    </div>

                    <div class="card kpi ranking">
                        <h2 class="title-ranking">OS MAIORES PIRATAS</h2>
                        <table id="tabela_ranking">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>Recorde</th>
                                </tr>
                            </thead>
                            <tbody id="corpo_ranking">
                            </tbody>
                        </table>
                    </div>

                    <div class="card chart maior">
                        <h3>Evolução pessoal (Últimos Jogos)</h3>
                        <div class="graph">
                            <canvas id="myChartCanvas"></canvas>
                        </div>
                        <div class="label-captura">
                            <p id="avisoCaptura" style="color: red"></p>
                        </div>
                    </div>

                </div>
            </div>

</html>

<script>

    validarSessao()

    const iconesPersonagens = {
        "Luffy": "luffy.png", "Zoro": "zoro.png", "Nami": "nami.png",
        "Usopp": "usopp.png", "Sanji": "sanji.png", "Chopper": "chopper.png",
        "Robin": "robin.png", "Franky": "franky.png", "Brook": "brook.png", "Jinbe": "jinbe.png"
    };

    function atualizarMugiwara() {
        var idPersonagem = document.getElementById("sel_mugiwara").value;

        fetch(`/usuarios/atualizarPersonagem/${sessionStorage.ID_USUARIO}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idPersonagemServer: idPersonagem
            })
        }).then(function (resposta) {
            if (resposta.ok) {
                alert("Mugiwara atualizado!");
                // recarrega a pagina ao escolher um mugiwara diferente
                buscarPersonagemUsuario();
            }
        });
    }

    function buscarPersonagemUsuario() {
        fetch(`/usuarios/buscarPersonagem/${sessionStorage.ID_USUARIO}`)
            .then(function (resposta) {
                if (resposta.ok && resposta.status == 200) {
                    resposta.json().then(function (dados) {
                        if (dados.length > 0) {
                            exibirPersonagem(dados[0].nome);
                        }
                    });
                }
            });
    }

    function exibirPersonagem(nome) {
        document.getElementById("kpi_personagem").innerHTML = nome;
        var img = document.getElementById("img_personagem");
        img.src = `../assets/imgpersonagens/${nome.toLowerCase()}.png`; // ex: luffy.png
        img.style.display = "block";
    }

    var idUsuario = sessionStorage.ID_USUARIO;

    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    document.getElementById("kpi_nome").innerHTML = sessionStorage.NOME_USUARIO;

    let proximaAtualizacao;

    // quando carregar a página, chama a função para buscar os dados
    window.onload = buscarDadosIniciais();

    function buscarDadosIniciais() {

        // buscar personagem
        buscarPersonagemUsuario();

        buscarRecorde(idUsuario)

        // busca do ranking, que está logo abaixo
        // sem parâmetro porque é uma função que exibe todos os usuários com limit 5
        buscarRanking()

        // busca dos dados para o gráfico
        obterDadosGrafico(idUsuario);

    }

    function buscarRanking() {
        fetch("/dash/ranking").then(function (resposta) {
            if (resposta.ok) {
                if (resposta.status == 204) {
                    console.log("Nenhum resultado no ranking.");

                    return;
                }

                resposta.json().then(function (dados) {
                    console.log("Dados do Ranking recebidos: ", dados);

                    var corpoRanking = document.getElementById("corpo_ranking");

                    corpoRanking.innerHTML = "";

                    // printar na tela o ranking
                    for (var i = 0; i < dados.length; i++) {
                        var jogador = dados[i];

                        corpoRanking.innerHTML += `
                                                <tr>
                                                    <td>${jogador.nome}</td>
                                                    <td>${jogador.recorde_pessoal}</td>
                                                </tr>`
                    };
                });
            } else {
                console.error("Houve um erro na API de ranking!");
            }
        }).catch(function (erro) {
            console.error("Erro na requisição do ranking:", erro);
        });
    }

    function buscarRecorde(idUsuario) {
        fetch(`/dash/recorde/${idUsuario}`, { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        console.log(`Dados do recorde recebidos: ${JSON.stringify(resposta)}`);

                        // array de objetos que contém o máximo de acertos
                        var recorde = resposta[0].max_acertos;

                        // Se o valor for null (nunca jogou), 0
                        if (recorde == null) {
                            document.getElementById("kpi_recorde").innerHTML = "0 Acertos";
                        } else {
                            document.getElementById("kpi_recorde").innerHTML = `${recorde} Acertos`;
                        }
                    });
                } else {
                    console.error('Erro na API de recorde');
                }
            })
            .catch(function (error) {
                console.error(`Erro ao buscar recorde: ${error.message}`);
            });
    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(idUsuario) {

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        fetch(`/dash/evolucao/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    // resposta.reverse();

                    plotarGrafico(resposta, idUsuario);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                document.getElementById("avisoCaptura").innerHTML = "Jogue o quiz para ver sua evolução!";
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, idUsuario) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [{
                label: 'Acertos', // Trocado de Umidade para Acertos
                data: [],
                fill: false,
                borderColor: 'rgb(159, 205, 239)',
                backgroundColor: 'rgba(159, 205, 239, 0.5)',
                tension: 0.1
            }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];

            // acertos
            labels.push(registro.momento_jogo);
            dados.datasets[0].data.push(registro.acertos);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // config gráfico
        const config = {
            type: 'line', // Você pode mudar para 'bar' se preferir gráfico de barras
            data: dados,
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChartCanvas`),
            config
        );

        // Se quiser que o gráfico fique verificando se tem jogos novos enquanto o usuário está na tela:
        // setTimeout(() => atualizarGrafico(idUsuario, dados, myChart), 5000);
    }

    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medida inserida em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function atualizarGrafico(idUsuario, dados, myChart) {
        // optei por não atualizar constantemente como em um projeto IoT
        console.log("A função atualizarGrafico foi chamada, mas está desativada para poupar chamadas ao banco.");
    }
</script>
